<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simple Timer</title>
  <meta name="description" content="Basic and fast tools for work, study, programming and other activities.">
  <meta name="keywords" content="Timer, Cronômetro, ciência da computação, conversor de medidas, cibersegurança, hacking, educação, programação, conceitos, fundamentos, educacional">
  <meta name="author" content="Gustavo Araújo">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      connect-src 'self';
      font-src 'self';
      frame-ancestors 'none';
    ">

  <link rel="stylesheet" href="/styles/tools.css?v=1.0">
  <link rel="stylesheet" href="/styles/buttons-themes.css?v=1.0">
</head>
<body class="dark-theme">
  <button id="toggle-theme" class="button-theme button-theme-dark" aria-label="Alternar tema">🌗</button>

  <header>
    <h1>TOOLS</h1>
  </header>

  <main id="tools-container">
    <nav>
      <ul>
        <li><a href="#">Timer</a></li>
        <li><a href="#">Cronômetro</a></li>
      </ul>
    </nav>

    <section id="clock">
      <div id="timer">00:00:00:000</div>

      <h2>Definir Tempo</h2>
      <div id="input-numbers" class="inputNumbers">
        <input type="number" name="hours" placeholder="Horas" min="0">
        <input type="number" name="minutes" placeholder="Minutos" min="0" max="59">
        <input type="number" name="seconds" placeholder="Segundos" min="0" max="59">
        <input type="number" name="milliseconds" placeholder="Milissegundos" min="0" max="999">
      </div>

      <h2>Lembrete</h2>
      <div id="reminder">
        <input type="number" name="hours" placeholder="Horas" min="0">
        <input type="number" name="minutes" placeholder="Minutos" min="0" max="59">
        <input type="number" name="seconds" placeholder="Segundos" min="0" max="59">
        <input type="number" name="milliseconds" placeholder="Milissegundos" min="0" max="999">
      </div>

      <div id="buttons">
        <button id="start-stop-continue">▶️ Iniciar</button>
        <button id="restart">⏮️ Reiniciar</button>
      </div>

      <div id="task-completed">
        <input name="user-text" type="text" placeholder="Tarefa concluída">
        <button name="mark-time">📌 Marcar Tempo</button>
      </div>
      <output></output>
    </section>
  </main>
  <script src="/scripts/toggle-theme.js"></script>
  <script src="/scripts/tools.js"></script>
</body>
</html>
