<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Gustavo Araújo</title>
    <meta charset="UTF-8">
    <meta name="description" content="Read blogs and understand the basic concepts and fundamentals of computing and cybersecurity. Use basic and practical tools for your tasks.">
    <meta name="keywords" content="science of computation, cybersecurity, hacking, education, programming, concepts, fundamentals, educational, tools, timer, task timers, task list, blogs, articles">
    <meta name="author" content="Gustavo Araújo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/styles/animations.css?v=1.0">
    <link rel="stylesheet" type="text/css" href="/styles/links-and-toggles.css?v=1.0">
    <link rel="stylesheet" type="text/css" href="/styles/home.css?v=1.0">
  </head>
  <body class="dark-theme body-is-lit-by-moon">
    <header class="slide-up-3s">
      <nav id="menu-area">
        <a href="#">Home</a>
        <a href="/about/">About me</a>
        <a href="/about/#contact">Contact me</a>
      </nav>
    </header>
    <main>
      <article id="use-tools" class="slide-left-5s">
        <i class="tools-icon"></i>
        <div id="tools-container" class="collapsed">
          <button id="expand-tools"><i class="arrow"></i></button>
          <nav id="tools-list">
            <ul>
              <li><a data-tool="timer-container"><i class="timer-icon"></i></a></li>
              <li><a data-tool="tasks-container"><i class="task-timers-icon"></i></a></li>
            </ul>
          </nav>
          <section id="timer-container" class="tool-content">
            <h2>⏲️</h2>
            <div id="timer" class="display-timer active">00:00:00:000</div>
            <div id="timer-input-numbers" class="timer-input-numbers">
              <input type="number" name="hours" placeholder="Hours" min="0">
              <input type="number" name="minutes" placeholder="Minutes" min="0" max="59">
              <input type="number" name="seconds" placeholder="Seconds" min="0" max="59">
              <input type="number" name="milliseconds" placeholder="Milliseconds" min="0" max="999">
              <input id="timer-volume-input" type="range" min="0" max="1" step="0.01" value="1"></input>
            </div>
            <div id="timer-buttons" class="clocks-buttons">
              <button id="timer-start-stop-continue">Start</button>
              <button id="timer-restart">Restart</button>
              <button id="play-test-sound">🔊</button>
            </div>
          </section>  
          <section id="tasks-container" class="tool-content">
            <h2>🧠</h2>
            <div id="reminder" class="tasks-input-numbers">
              <input type="number" name="hours" placeholder="Hours" min="0">
              <input type="number" name="minutes" placeholder="Minutes" min="0" max="59">
              <input type="number" name="seconds" placeholder="Seconds" min="0" max="59">
              <input type="number" name="milliseconds" placeholder="Milliseconds" min="0" max="999">
              <input name="task-name" type="text" placeholder="Study...">
              <input id="tasktimer-volume-input" type="range" min="0" max="1" step="0.01" value="1"></input>
            </div>
            <div id="reminder-buttons" class="clocks-buttons">
              <button id="add-task">Timer mark</button>
              <button id="tasktimer-play-test-sound">🔊</button>
            </div>
            <div id="tasks"></div>
          </section>
        </div>
      </article>
      <article id="read-blogs" class="slide-up-5s">
        <i class="blogs-icon"></i>
        <p>I have some markdowns and mind maps on my <a href="https://github.com/gusprojects008/mapas-mentais" target="_blank">github</a>!</p>
        <div id="blogs-container-wrapper" class="collapsed">
          <button id="expand-blogs"><i class="arrow"></i></button>
          <div id="blogs-container"></div>
        </div>
      </article>
    </main>
    <script src="/scripts/tools.js"></script>
    <script src="/scripts/blogs.js"></script>
    <script src="/scripts/links-and-toggles.js"></script>
  </body>
</html>
